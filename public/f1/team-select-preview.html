<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Team Select Preview</title>
<style>
  @font-face {
    font-family: "AvantGarde";
    src: url("AvantGardeForSalesforce.woff2") format("woff2");
    font-weight: 700;
    font-style: normal;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    background: #1240d6;
    font-family: "AvantGarde", -apple-system, sans-serif;
  }

  /* Full-viewport screen — matches React `relative flex h-screen flex-col overflow-hidden` */
  .screen {
    position: relative;
    width: 100%;
    height: 100vh;
    background: #1240d6;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* dot bg */
  .screen::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,255,255,0.07) 1px, transparent 1px);
    background-size: 22px 22px;
    pointer-events: none;
    z-index: 0;
  }

  /* progress bar — React: mx-auto mt-9 shrink-0, width 67.5%, paddingTop 68 */
  .progress-wrap {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    margin-top: 36px;
    padding-top: 68px;
  }
  .progress-wrap img { width: 67.5%; }

  /* title — React: px-10 pt-4 shrink-0, h2 fontSize:86 paddingLeft/Right:200 paddingTop:90, p fontSize:40 padding 100/100/20 */
  .title-wrap {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    padding-left: 40px;
    padding-right: 40px;
    padding-top: 16px;
  }
  .title-wrap h2 {
    color: white;
    text-align: center;
    font-weight: 900;
    font-size: 86px;
    line-height: 1.05;
    font-family: "AvantGarde", sans-serif;
    padding-left: 200px;
    padding-right: 200px;
    padding-top: 90px;
  }
  .title-wrap p {
    color: white;
    text-align: center;
    font-size: 40px;
    margin-top: 8px;
    padding-left: 100px;
    padding-right: 100px;
    padding-top: 20px;
    line-height: 1.3;
  }

  /* track — React: relative z-10 mx-2, flex:1 1 0, minHeight:0, overflow:visible */
  .track {
    position: relative;
    z-index: 10;
    flex: 1 1 0;
    min-height: 0;
    overflow: visible;
    margin: 0 8px;
  }

  /* road — React: absolute top:120 left:0 width:100% scale(1.08) mix-blend-mode:screen */
  .road {
    pointer-events: none;
    position: absolute;
    top: 120px;
    left: 0;
    width: 100%;
    transform: scale(1.08);
    transform-origin: top left;
    mix-blend-mode: screen;
    z-index: 0;
  }

  /* team circles — matches React motion.div with paddingBottom trick */
  .team {
    position: absolute;
    transform: translate(-50%, -50%);
    z-index: 10;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .team.selected {
    transform: translate(-50%, -50%) scale(1.12);
    z-index: 20;
  }

  /* square container via padding-bottom: 100% trick (same as React) */
  .team-inner {
    position: relative;
    width: 100%;
    padding-bottom: 100%;
  }

  /* selected ring PNG — sits behind the pill */
  .sel-ring {
    display: none;
    position: absolute;
    inset: -6px;
    width: calc(100% + 12px);
    height: calc(100% + 12px);
    z-index: 0;
    pointer-events: none;
  }
  .team.selected .sel-ring { display: block; }

  /* pill button */
  .team-btn {
    position: absolute;
    inset: 0;
    background: none;
    border: none;
    padding: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }
  .team-btn img {
    width: 100%;
    height: auto;
    display: block;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.25));
  }

  /* hint — React: fontSize:35 fontFamily paddingTop:150 pb-2 */
  .hint {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    text-align: center;
    color: white;
    font-weight: 700;
    font-size: 35px;
    font-family: "AvantGarde", sans-serif;
    padding-top: 150px;
    padding-bottom: 8px;
    line-height: 1.3;
  }

  /* nav — React: px-6 pb-10 pt-2 */
  .nav {
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 24px 40px;
  }
  .btn-back { background: none; border: none; padding: 0; cursor: pointer; }
  .btn-next {
    background: none; border: none; padding: 0; cursor: pointer;
    opacity: 0.4;
    transition: opacity 0.3s;
  }
  .btn-next.active { opacity: 1; }
  .nav img { display: block; }
</style>
</head>
<body>
<div class="screen">

  <div class="progress-wrap">
    <img src="../Progress bar60.png" alt="" />
  </div>

  <div class="title-wrap">
    <h2>Who do you bleed for?</h2>
    <p>Your team steers the melody that makes this beat yours.</p>
  </div>

  <div class="track" id="track">
    <img class="road" src="../road-screen6.png" alt="" />
    <!-- teams injected by script -->
  </div>

  <p class="hint">Select your team<br>and click next</p>

  <div class="nav">
    <button class="btn-back">
      <img src="Buttons/Back.png" alt="Back" style="width:100px;height:100px;" />
    </button>
    <button class="btn-next" id="nextBtn">
      <img src="Buttons/Next.png" alt="Next" style="width:260px;height:auto;" />
    </button>
  </div>

</div>
<script>
// ─── EDIT POSITIONS HERE (this file only — TSX has no effect on this preview) ─
// top/left = circle CENTER as % of the track container height/width
// size     = diameter as % of container WIDTH
// Once happy, paste the same values into TEAM_POSITIONS in team-select-screen.tsx
const POSITIONS = {
  "racing-bulls":  { top: "2%",  left: "10%", size: "16%" },
  "alpine":        { top: "2%",  left: "39%", size: "16%" },
  "red-bull":      { top: "2%",  left: "67%", size: "16%" },
  "mercedes":      { top: "25%", left: "82%", size: "16%" },
  "cadillac":      { top: "48%", left: "18%", size: "16%" },
  "haas":          { top: "48%", left: "41%", size: "18%" },
  "ferrari":       { top: "47%", left: "69%", size: "16%" },
  "williams":      { top: "69%", left: "2%",  size: "16%" },
  "aston-martin":  { top: "93%", left: "18%", size: "16%" },
  "mclaren":       { top: "93%", left: "41%", size: "16%" },
  "audi":          { top: "93%", left: "69%", size: "16%" },
};
// ─────────────────────────────────────────────────────────────────────────────

const PILLS = {
  "racing-bulls":  "teams/pills/SF Forever-6.png",
  "alpine":        "teams/pills/SF Forever-10.png",
  "red-bull":      "teams/pills/SF Forever-4.png",
  "mercedes":      "teams/pills/SF Forever-3.png",
  "cadillac":      "teams/pills/SF Forever.png",
  "haas":          "teams/pills/SF Forever-1.png",
  "ferrari":       "teams/pills/SF Forever-5.png",
  "williams":      "teams/pills/SF Forever-7.png",
  "aston-martin":  "teams/pills/SF Forever-9.png",
  "mclaren":       "teams/pills/SF Forever-2.png",
  "audi":          "teams/pills/SF Forever-8.png",
};

const LABELS = {
  "racing-bulls": "Racing Bulls", "alpine": "Alpine", "red-bull": "Red Bull",
  "mercedes": "Mercedes", "cadillac": "Cadillac", "haas": "Haas",
  "ferrari": "Ferrari", "williams": "Williams", "aston-martin": "Aston Martin",
  "mclaren": "McLaren", "audi": "Audi",
};

const track = document.getElementById('track');
let selected = null;
const nextBtn = document.getElementById('nextBtn');

Object.keys(POSITIONS).forEach(id => {
  const { top, left, size } = POSITIONS[id];
  const wrap = document.createElement('div');
  wrap.className = 'team';
  wrap.dataset.id = id;
  wrap.style.cssText = `top:${top}; left:${left}; width:${size};`;
  wrap.innerHTML = `
    <div class="team-inner">
      <img class="sel-ring" src="teams/pills/selectedStatePills.png" alt="" />
      <button class="team-btn"><img src="${PILLS[id]}" alt="${LABELS[id]}" /></button>
    </div>`;
  wrap.addEventListener('click', () => {
    if (selected) selected.classList.remove('selected');
    selected = wrap;
    wrap.classList.add('selected');
    nextBtn.classList.add('active');
  });
  track.appendChild(wrap);
});
</script>
</body>
</html>
